name: CI

on:
  push:
    branches: ["master", "main", "feature/**"]
  pull_request:
    branches: ["master", "main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run unit tests (no docker stack required)
        run: |
          pytest tests/ -v \
            --ignore=tests/test_meeting_scribe.py \
            -p no:warnings
        # Integration test (test_meeting_scribe.py) requires running Ollama + Postgres.
        # Run it locally after `docker compose up -d` and `ollama pull mistral:7b`.
        # Future: add self-hosted GitHub runner on the KEZAD server for full CI.
